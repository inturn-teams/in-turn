<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1f2937" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1f2937" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1f2937" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1f2937" stroke-width="1"/>

  <!-- Accent glow blob -->
  <ellipse cx="600" cy="315" rx="320" ry="200" fill="#6366f1" fill-opacity="0.06"/>

  <!-- Logo mark (GPS turn arrow, scaled up ~4x from original 24px viewbox) -->
  <g transform="translate(80, 60) scale(4.2)" filter="url(#glow)">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 18 L7 10 Q7 6 11 6 L17 6"/>
      <polyline points="14,3 17,6 14,9"/>
    </svg>
  </g>

  <!-- "In Turn" wordmark -->
  <text x="80" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="92" font-weight="700" fill="white" letter-spacing="-3">In Turn</text>

  <!-- Accent underline -->
  <rect x="80" y="218" width="320" height="4" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="80" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="400" fill="#9ca3af" letter-spacing="0">The career platform for Canadian students</text>
  <text x="80" y="334" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="400" fill="#9ca3af" letter-spacing="0">and new graduates.</text>

  <!-- Feature pills -->
  <g transform="translate(80, 390)">
    <!-- Resume Tailor pill -->
    <rect width="230" height="48" rx="24" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="115" y="30" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#e5e7eb">Resume Tailor</text>

    <!-- Internship Finder pill -->
    <rect x="250" width="260" height="48" rx="24" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="380" y="30" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#e5e7eb">Internship Finder</text>

    <!-- App Tracker pill -->
    <rect x="530" width="270" height="48" rx="24" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="665" y="30" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#e5e7eb">Application Tracker</text>
  </g>

  <!-- Domain -->
  <text x="1120" y="590" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="#6b7280">inturn.ca</text>
</svg>
